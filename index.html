<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🖼️ Image Converter - PNG JPG ICO SVG WebP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <meta name="description" content="Kostenloser Image Converter - PNG JPG JPEG ICO SVG WebP AVIF BMP TIFF">
</head>
<body class="bg-gradient-to-br from-purple-600 via-blue-600 to-indigo-700 min-h-screen font-inter">
  
  <!-- Header -->
  <header class="text-center py-12 px-4">
    <h1 class="text-5xl md:text-6xl font-bold text-white mb-6 drop-shadow-2xl">
      🖼️ Image Converter
    </h1>
    <p class="text-xl md:text-2xl text-white/90 max-w-2xl mx-auto mb-12">
      Konvertiere PNG JPG ICO SVG WebP & alle Formate kostenlos!
    </p>
    
    <!-- SOCIALS -->
    <div class="flex flex-wrap gap-6 justify-center mb-12">
      <a href="https://github.com/breckztv" target="_blank" 
         class="flex items-center gap-3 px-6 py-3 bg-white/20 hover:bg-white/30 rounded-2xl text-white font-semibold transition-all">
        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.185 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        GitHub
      </a>
      <a href="https://youtube.com/@breckztv" target="_blank" 
         class="flex items-center gap-3 px-6 py-3 bg-white/20 hover:bg-white/30 rounded-2xl text-white font-semibold transition-all">
        📺 YouTube
      </a>
      <a href="https://instagram.com/breckztv" target="_blank" 
         class="flex items-center gap-3 px-6 py-3 bg-white/20 hover:bg-white/30 rounded-2xl text-white font-semibold transition-all">
        📸 Instagram
      </a>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 pb-16">
    
    <!-- Upload Section -->
    <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 md:p-12 mb-12 border border-white/20">
      <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-white mb-4">📤 Datei hochladen</h2>
      </div>
      
      <div class="space-y-6">
        <!-- File Input -->
        <label class="block w-full cursor-pointer">
          <input type="file" id="fileInput" accept="image/*" class="hidden">
          <div class="w-full p-8 border-2 border-dashed border-white/30 rounded-2xl text-center hover:border-white/50 transition-all bg-white/5">
            <svg class="w-16 h-16 mx-auto mb-4 text-white/70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
            </svg>
            <p class="text-xl font-semibold text-white mb-1">Datei hier ablegen oder klicken</p>
            <p class="text-white/70">PNG, JPG, SVG, ICO, WebP, GIF, HEIC...</p>
          </div>
        </label>
        
        <!-- Preview -->
        <div id="preview" class="hidden bg-black/20 rounded-2xl p-6 text-center">
          <img id="previewImg" class="max-h-96 mx-auto rounded-xl shadow-2xl block" alt="Vorschau">
          <p id="fileInfo" class="text-white mt-4 font-mono bg-black/30 px-4 py-2 rounded-xl inline-block"></p>
        </div>
      </div>
    </div>

    <!-- Converter Controls -->
    <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 md:p-12 mb-12 border border-white/20">
      <h2 class="text-3xl font-bold text-white mb-8 text-center">⚙️ Konvertierung</h2>
      
      <div class="grid md:grid-cols-2 gap-8">
        <!-- Format Select -->
        <div>
          <label class="block text-white font-semibold mb-4">Zielformat:</label>
          <select id="formatSelect" class="w-full p-4 bg-white/20 rounded-2xl text-white text-lg border border-white/30 focus:border-white">
            <option value="png">🖼️ PNG (Transparent)</option>
            <option value="jpeg">📸 JPG/JPEG (Komprimiert)</option>
            <option value="webp">⚡ WebP (Schnell & Klein)</option>
            <option value="ico">⭐ ICO/Favicon (16/32/64px)</option>
            <option value="svg">📐 SVG (Vektor/Skalierbar)</option>
          </select>
        </div>
        
        <!-- Quality Slider -->
        <div>
          <label class="block text-white font-semibold mb-4">Qualität:</label>
          <div class="flex items-center gap-4">
            <input type="range" id="qualitySlider" min="10" max="100" value="90" 
                   class="w-full h-3 bg-white/30 rounded-lg appearance-none cursor-pointer accent-purple-400">
            <span id="qualityValue" class="text-2xl font-bold text-white">90%</span>
          </div>
        </div>
      </div>
      
      <!-- Convert Button -->
      <div class="text-center mt-12">
        <button onclick="convertImage()" 
                class="px-12 py-6 bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 
                       text-2xl font-bold text-white rounded-3xl shadow-2xl hover:shadow-purple-500/25 
                       transition-all duration-300 transform hover:-translate-y-1">
          ✨ Konvertieren!
        </button>
      </div>
    </div>

    <!-- Download Section (hidden initially) -->
    <div id="downloadSection" class="hidden bg-green-500/20 backdrop-blur-xl rounded-3xl p-8 md:p-12 border border-green-400/50">
      <h2 class="text-3xl font-bold text-white mb-8 text-center">✅ Fertig!</h2>
      
      <div class="text-center mb-8">
        <img id="convertedPreview" class="max-h-80 mx-auto rounded-2xl shadow-2xl block" alt="Konvertierte Vorschau">
        <p id="downloadInfo" class="text-2xl font-bold text-white mt-6 bg-black/30 px-6 py-3 rounded-2xl inline-block"></p>
      </div>
      
      <div class="text-center">
        <a id="downloadLink" 
           class="inline-block px-12 py-6 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 
                  text-2xl font-bold text-white rounded-3xl shadow-2xl hover:shadow-emerald-500/25 
                  transition-all duration-300 transform hover:-translate-y-1">
           💾 Download starten
        </a>
      </div>
    </div>
  </main>

  <script src="converter.js"></script>
</body>
</html>
